name: Browser Global Check

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Type of version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  run-browser-code:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Execute Script
        run: npm run check-globals

      - name: Bump Version and Commit
        id: versioning
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add browser_globals.json
          
          # Use the input from the dropdown menu (patch, minor, or major)
          npm version ${{ github.event.inputs.version_type }} -m "Bump to %s [skip ci]"
          
          NEW_TAG="v$(node -p "require('./package.json').version")"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          
          git push && git push --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.versioning.outputs.tag }}
          name: Release ${{ steps.versioning.outputs.tag }}
          body: |
            Automated update of browser globals.
            Type: ${{ github.event.inputs.version_type }}
            Version: ${{ steps.versioning.outputs.tag }}
          files: |
            browser_globals.json
