name: Browser Global Check

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Type of version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  run-browser-code:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Execute Script and Compare
        id: versioning
        run: |
          if [ -f browser_globals.json ]; then
            cp browser_globals.json old_globals.json
          else
            echo "[]" > old_globals.json
          fi

          npm run check-globals

          node -e "
            const fs = require('fs');
            const oldG = JSON.parse(fs.readFileSync('./old_globals.json', 'utf8'));
            const newG = JSON.parse(fs.readFileSync('./browser_globals.json', 'utf8'));
            
            const added = newG.filter(x => !oldG.includes(x));
            const removed = oldG.filter(x => !newG.includes(x));

            function formatList(list, label) {
              if (list.length === 0) return '';
              
              const fullList = list.map(x => '* ' + x).join('\n');
              
              if (list.length <= 10) {
                return fullList;
              } else {
                const preview = list.slice(0, 10).map(x => '* ' + x).join('\n');
                const remaining = list.length - 10;
                return preview + '\n\n<details>\n<summary>...and ' + remaining + ' more (Click to view full list)</summary>\n\n' + fullList + '\n</details>';
              }
            }

            const addedOutput = formatList(added);
            const removedOutput = formatList(removed);
            
            fs.appendFileSync(process.env.GITHUB_ENV, 'ADDED_VARS<<EOF\n' + addedOutput + '\nEOF\n');
            fs.appendFileSync(process.env.GITHUB_ENV, 'REMOVED_VARS<<EOF\n' + removedOutput + '\nEOF\n');
          "

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.versioning.outputs.tag }}
          name: Release ${{ steps.versioning.outputs.tag }}
          body: |
            ## Browser Globals Update
            
            **Release Version:** ${{ steps.versioning.outputs.tag }}
            ${{ env.ADDED_VARS != '' && '### 🟢 New Additions' || '' }}
            ${{ env.ADDED_VARS || '* No new additions' }}
            
            ${{ env.REMOVED_VARS != '' && '### 🔴 Removed Variables' || '' }}
            ${{ env.REMOVED_VARS }}
          files: |
            browser_globals.json
