name: Browser Global Check

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Type of version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  run-browser-code:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Execute Script and Compare
        id: compare_globals
        run: |
          if [ -f browser_globals.json ]; then
            cp browser_globals.json old_globals.json
          else
            echo "[]" > old_globals.json
          fi

          npm run check-globals

          node -e "
            const fs = require('fs');
            const oldG = JSON.parse(fs.readFileSync('./old_globals.json', 'utf8'));
            const newG = JSON.parse(fs.readFileSync('./browser_globals.json', 'utf8'));
            
            const added = newG.filter(x => !oldG.includes(x));
            const removed = oldG.filter(x => !newG.includes(x));

            function formatList(list, label) {
              if (list.length === 0) return '';
              
              const fullList = list.map(x => '* ' + x).join('\n');
              
              if (list.length <= 10) {
                return fullList;
              } else {
                const preview = list.slice(0, 10).map(x => '* ' + x).join('\n');
                const remaining = list.length - 10;
                return preview + '... and ${remaining} more\n\n<details>\n<summary>' + '(Click to view full list)</summary>\n\n' + fullList + '\n</details>';
              }
            }

            const addedOutput = formatList(added);
            const removedOutput = formatList(removed);
            
            fs.appendFileSync(process.env.GITHUB_ENV, 'ADDED_VARS<<EOF\n' + addedOutput + '\nEOF\n');
            fs.appendFileSync(process.env.GITHUB_ENV, 'REMOVED_VARS<<EOF\n' + removedOutput + '\nEOF\n');
          "


      - name: Bump Version and Commit
        id: versioning
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add browser_globals.json

          # Check if there are actual staged changes
          if git diff --staged --quiet; then
            echo "No changes detected in browser_globals.json. Exiting."
            echo "changed=false" >> $GITHUB_OUTPUT
            # Optionally stop the job right here
            exit 0
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            
            # Determine message
            if git ls-files --error-unmatch browser_globals.json > /dev/null 2>&1; then
              MSG="Updated Browser Globals"
            else
              MSG="Added Browser Globals"
            fi

            git commit -m "$MSG"
            
            # Perform version bump
            npm version ${{ github.event.inputs.version_type }} --force -m "Bump to %s [skip ci]"
            
            NEW_TAG="v$(node -p "require('./package.json').version")"
            echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
            
            git push && git push --tags
          fi


      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: steps.versioning.outputs.changed == 'true'
        with:
          tag_name: ${{ steps.versioning.outputs.tag }}
          name: Release ${{ steps.versioning.outputs.tag }}
          body: |
            ## Browser Globals Update Report
            
            **Update Type:** ${{ github.event.inputs.version_type }}
            **Release Version:** ${{ steps.versioning.outputs.tag }}
            
            ---
            
            ${{ env.ADDED_VARS != '' && '### 🟢 New Additions' || '' }}
            ${{ env.ADDED_VARS || '* No new additions' }}
            
            ${{ env.REMOVED_VARS != '' && '### 🔴 Removed Variables' || '' }}
            ${{ env.REMOVED_VARS }}
          files: |
            browser_globals.json


      - name: Update Changelog
        if: steps.versioning.outputs.changed == 'true'
        run: |
          NEW_TAG="v$(node -p "require('./package.json').version")"
          node updateChangelog.js "$NEW_TAG"
      
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
      
          git add CHANGELOG.md
      
          # Only commit if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "Update Browser Globals for $NEW_TAG"
            git push
          else
            echo "No changes to commit"
          fi
