name: Browser Global Check

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Type of version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  run-browser-code:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Execute Script and Compare
        id: compare_globals
        run: |
          # Store the old globals if the file exists
          if [ -f browser_globals.json ]; then
            cp browser_globals.json old_globals.json
          else
            echo "[]" > old_globals.json
          fi

          # Run your script to generate the new browser_globals.json
          npm run check-globals

          # Use Node to find the difference (new additions only)
          NEW_VARS=$(node -e "
            const oldG = require('./old_globals.json');
            const newG = require('./browser_globals.json');
            const diff = newG.filter(x => !oldG.includes(x));
            console.log(diff.join(', ') || 'None');
          ")
          
          # Store the result in the workflow environment
          echo "NEW_GLOBALS=$NEW_VARS" >> $GITHUB_ENV
          echo "diff=$NEW_VARS" >> $GITHUB_OUTPUT

      - name: Bump Version and Commit
        id: versioning
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add browser_globals.json
          
          npm version ${{ github.event.inputs.version_type }} --force -m "Bump to %s [skip ci]"
          
          NEW_TAG="v$(node -p "require('./package.json').version")"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          
          git push && git push --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.versioning.outputs.tag }}
          name: Release ${{ steps.versioning.outputs.tag }}
          body: |
            ## Automated update of browser globals
            **Type:** ${{ github.event.inputs.version_type }}
            **Version:** ${{ steps.versioning.outputs.tag }}
            
            ### 🆕 New Variables Added:
            ${{ env.NEW_GLOBALS }}
          files: |
            browser_globals.json
