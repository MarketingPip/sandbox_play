name: Browser Global Check

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Type of version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  check-globals:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.compare.outputs.changed }}
      added_vars: ${{ steps.compare.outputs.added_vars }}
      removed_vars: ${{ steps.compare.outputs.removed_vars }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Execute Script and Compare
        id: compare
        run: |
          if [ -f browser_globals.json ]; then
            cp browser_globals.json old_globals.json
          else
            echo "[]" > old_globals.json
          fi

          npm run check-globals || exit 1

          node -e "
            const fs = require('fs');
            const oldG = JSON.parse(fs.readFileSync('./old_globals.json', 'utf8'));
            const newG = JSON.parse(fs.readFileSync('./browser_globals.json', 'utf8'));
            
            const added = newG.filter(x => !oldG.includes(x));
            const removed = oldG.filter(x => !newG.includes(x));

            function formatList(list) {
              if (!list.length) return '';
              const fullList = list.map(x => '* ' + x).join('\n');
              if (list.length <= 10) return fullList;
              const preview = list.slice(0, 10).map(x => '* ' + x).join('\n');
              return preview + '\n\n   ... and ' + (list.length-10) + ' more\n\n<details><summary>(Click to view full list)</summary>\n\n' + fullList + '\n</details>';
            }

            const addedOutput = formatList(added);
            const removedOutput = formatList(removed);

            fs.writeFileSync('./added_vars.txt', addedOutput);
            fs.writeFileSync('./removed_vars.txt', removedOutput);

            console.log('::set-output name=added_vars::' + addedOutput);
            console.log('::set-output name=removed_vars::' + removedOutput);
            console.log('::set-output name=changed::' + (added.length + removed.length > 0));
          "

  generate-changelog:
    needs: check-globals
    runs-on: ubuntu-latest
    if: needs.check-globals.outputs.changed == 'true'
    outputs:
      success: ${{ steps.changelog.outputs.success }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Changelog (locally)
        id: changelog
        run: |
          NEW_TAG="TEMP"  # Placeholder; actual tag will be set after version bump
          ADDED="${{ needs.check-globals.outputs.added_vars }}"
          REMOVED="${{ needs.check-globals.outputs.removed_vars }}"

          node updateChangelog.js "$NEW_TAG" "$ADDED" "$REMOVED" || exit 1

          echo "success=true" >> $GITHUB_OUTPUT

  version-bump-and-release:
    needs: generate-changelog
    runs-on: ubuntu-latest
    if: needs.generate-changelog.outputs.success == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Commit Browser Globals and Changelog, Bump Version
        id: versioning
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add browser_globals.json CHANGELOG.md

          # Determine if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Commit both files together
          git commit -m "Update Browser Globals and Changelog"

          # Bump version now
          npm version ${{ github.event.inputs.version_type }} --force -m "Bump to %s [skip ci]"

          NEW_TAG="v$(node -p "require('./package.json').version")"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

          git push && git push --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: steps.versioning.outputs.changed == 'true'
        with:
          tag_name: ${{ steps.versioning.outputs.tag }}
          name: Release ${{ steps.versioning.outputs.tag }}
          body: |
            ## Browser Globals Update Report
            **Update Type:** ${{ github.event.inputs.version_type }}
            **Release Version:** ${{ steps.versioning.outputs.tag }}

            ${{ needs.check-globals.outputs.added_vars != '' && '### 🟢 New Additions' || '' }}
            ${{ needs.check-globals.outputs.added_vars || '* No new additions' }}

            ${{ needs.check-globals.outputs.removed_vars != '' && '### 🔴 Removed Variables' || '' }}
            ${{ needs.check-globals.outputs.removed_vars }}
          files: |
            browser_globals.json
